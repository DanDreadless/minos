services:
  minos:
    # Published multi-arch image; swap for minos:latest if you build locally.
    image: ghcr.io/dandreadless/minos:latest
    container_name: minos
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:8080/tcp"
    volumes:
      - minos-data:/data

volumes:
  minos-data:
