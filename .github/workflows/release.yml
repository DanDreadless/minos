name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: tests (race detector — release blocker)
        run: go test -race ./...

  binaries:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: build frontend
        working-directory: web
        run: npm ci --no-fund --no-audit && npm run build
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build release binaries
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64; do
            export GOOS="${target%/*}" GOARCH="${target#*/}"
            ext=""
            [ "$GOOS" = "windows" ] && ext=".exe"
            name="minos_${VERSION}_${GOOS}_${GOARCH}"
            stage="dist/${name}"
            mkdir -p "$stage"
            CGO_ENABLED=0 go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "${stage}/minos${ext}" ./cmd/minos
            cp LICENSE README.md deploy/minos.service "$stage/"
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip -qr "${name}.zip" "$name")
            else
              tar -czf "dist/${name}.tar.gz" -C dist "$name"
            fi
            rm -r "$stage"
          done
          (cd dist && sha256sum ./*.tar.gz ./*.zip > checksums.txt)
      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --title "Minos $GITHUB_REF_NAME" \
            --generate-notes

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: image name and version
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
