name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" && echo "$unformatted" && exit 1
          fi
      - name: go vet
        run: go vet ./...
      # The race detector needs cgo, which the Windows dev box lacks —
      # this job is the authoritative race run and a release blocker.
      - name: tests (race detector)
        run: go test -race ./...
      - name: filter benchmarks compile
        run: go test ./internal/filter -bench . -benchmem -benchtime=1x -run '^$'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-fund --no-audit
      - name: type check
        run: npm run check
      - name: build
        run: npm run build

  # Full ACME issuance against Pebble (Let's Encrypt's test CA), with
  # pebble-challtestsrv as the mock DNS provider.
  acme-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: start pebble + challtestsrv
        run: |
          docker run -d --name challtestsrv --network host \
            ghcr.io/letsencrypt/pebble-challtestsrv:latest \
            -defaultIPv4 127.0.0.1
          docker run -d --name pebble --network host \
            -e PEBBLE_VA_NOSLEEP=1 \
            ghcr.io/letsencrypt/pebble:latest \
            -config test/config/pebble-config.json -dnsserver 127.0.0.1:8053
          # Wait for the directory to answer.
          for i in $(seq 1 30); do
            curl -sk https://localhost:14000/dir >/dev/null && exit 0
            sleep 1
          done
          echo "pebble never came up" && docker logs pebble && exit 1
      - name: e2e issuance
        env:
          PEBBLE_DIR_URL: https://localhost:14000/dir
          CHALLTESTSRV_URL: http://localhost:8055
          CHALLTESTSRV_DNS: 127.0.0.1:8053
        run: go test -tags acme_e2e -count=1 -v -run TestE2E ./internal/acme
      - name: service logs on failure
        if: failure()
        run: docker logs pebble; docker logs challtestsrv

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Built with our own toolchain so golangci-lint's Go can never lag
      # the go.mod version (prebuilt action binaries have).
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: lint
        run: golangci-lint run ./...
